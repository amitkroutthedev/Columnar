<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Columnar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Top Bar ─────────────────────────────────────────────── -->
  <header id="topbar">
    <div id="logo">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="9" height="9" rx="1.5" stroke="var(--accent)" stroke-width="1.5"/>
        <rect x="12" y="1" width="9" height="9" rx="1.5" stroke="var(--accent)" stroke-width="1.5" opacity="0.5"/>
        <rect x="1" y="12" width="9" height="9" rx="1.5" stroke="var(--accent)" stroke-width="1.5" opacity="0.5"/>
        <rect x="12" y="12" width="9" height="9" rx="1.5" stroke="var(--accent)" stroke-width="1.5" opacity="0.3"/>
      </svg>
      <span>Columnar</span>
    </div>

    <div id="file-info">
      <span id="file-name">No file loaded</span>
      <span id="file-meta" class="meta-dim"></span>
    </div>

    <div id="topbar-actions">
      <button class="btn-ghost" id="btn-open" title="Open file (Ctrl+O)">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M1.5 3.5A1 1 0 0 1 2.5 2.5h4l1.5 2h5a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1h-10a1 1 0 0 1-1-1v-9z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
        Open
      </button>
      <kbd class="shortcut-hint">Ctrl+O</kbd>
    </div>
  </header>

  <!-- ── Toolbar ────────────────────────────────────────────── -->
  <div id="toolbar">
    <div id="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/><path d="M9.5 9.5L13 13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      <input id="search-input" type="text" placeholder="Search all cells… (Ctrl+F)" spellcheck="false" />
      <span id="search-count" class="meta-dim"></span>
      <button id="btn-clear-search" class="btn-icon" style="display:none" title="Clear search">✕</button>
    </div>

    <div id="toolbar-right">
      <button class="btn-ghost" id="btn-goto" title="Go to row (Ctrl+G)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Go to row
      </button>
      <div id="sort-indicator" class="meta-dim" style="display:none">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M3 5l3-3 3 3" stroke="var(--accent)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span id="sort-label"></span>
      </div>
    </div>
  </div>

  <!-- ── Empty State ─────────────────────────────────────────── -->
  <div id="empty-state">
    <div id="empty-inner">
      <div id="empty-icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="4" width="18" height="18" rx="3" stroke="var(--accent)" stroke-width="1.5" opacity="0.9"/>
          <rect x="26" y="4" width="18" height="18" rx="3" stroke="var(--accent)" stroke-width="1.5" opacity="0.5"/>
          <rect x="4" y="26" width="18" height="18" rx="3" stroke="var(--accent)" stroke-width="1.5" opacity="0.5"/>
          <rect x="26" y="26" width="18" height="18" rx="3" stroke="var(--accent)" stroke-width="1.5" opacity="0.2"/>
        </svg>
      </div>
      <h2>Drop a CSV to begin</h2>
      <p>Or press <kbd>Ctrl+O</kbd> to open a file.<br/>Handles millions of rows without breaking a sweat.</p>
      <button class="btn-primary" id="btn-open-empty">Open file</button>
    </div>
  </div>

  <!-- ── Grid Container ──────────────────────────────────────── -->
  <div id="grid-wrap" style="display:none">
    <div id="grid-container">
      <!-- Header row (sticky) -->
      <div id="grid-header"></div>
      <!-- Virtual scroll viewport -->
      <div id="scroll-viewport">
        <div id="scroll-content">
          <!-- Rows injected here by main.js -->
        </div>
      </div>
    </div>
  </div>

  <!-- ── Status Bar ──────────────────────────────────────────── -->
  <footer id="statusbar" style="display:none">
    <span id="status-rows"></span>
    <span class="status-sep">·</span>
    <span id="status-cols"></span>
    <span class="status-sep">·</span>
    <span id="status-scroll"></span>
    <div id="status-right">
      <span id="status-hint">Click header to sort · Double-click for stats</span>
    </div>
  </footer>

  <!-- ── Column Stats Modal ──────────────────────────────────── -->
  <div id="stats-overlay" class="overlay" style="display:none">
    <div id="stats-modal" class="modal">
      <div class="modal-header">
        <h3 id="stats-title">Column Stats</h3>
        <button class="btn-icon modal-close" id="stats-close">✕</button>
      </div>
      <div id="stats-body">
        <div class="stat-grid" id="stats-grid"></div>
      </div>
    </div>
  </div>

  <!-- ── Go To Row Modal ─────────────────────────────────────── -->
  <div id="goto-overlay" class="overlay" style="display:none">
    <div id="goto-modal" class="modal modal-sm">
      <div class="modal-header">
        <h3>Go to row</h3>
        <button class="btn-icon modal-close" id="goto-close">✕</button>
      </div>
      <div class="modal-body">
        <input id="goto-input" type="number" min="1" placeholder="Row number…" />
        <button class="btn-primary" id="goto-confirm">Jump</button>
      </div>
      <p id="goto-hint" class="meta-dim"></p>
    </div>
  </div>

  <!-- ── Loading Overlay ─────────────────────────────────────── -->
  <div id="loading-overlay" style="display:none">
    <div id="loading-inner">
      <div id="loading-spinner"></div>
      <span id="loading-label">Loading…</span>
    </div>
  </div>

  <!-- ── Toast ───────────────────────────────────────────────── -->
  <div id="toast-container"></div>

  <script src="main.js"></script>
</body>
</html>
